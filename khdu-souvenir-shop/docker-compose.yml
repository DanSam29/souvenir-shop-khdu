services:
  db:
    image: mysql:8.0
    container_name: souvenir-shop-db
    restart: always
    environment:
      MYSQL_DATABASE: khdu_souvenir_shop
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: shop_user
      MYSQL_PASSWORD: shop_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: KhduSouvenirShop.API/Dockerfile
    container_name: souvenir-shop-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=khdu_souvenir_shop;Uid=shop_user;Pwd=shop_password;
    ports:
      - "5225:8080"
    depends_on:
      - db

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: souvenir-shop-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
