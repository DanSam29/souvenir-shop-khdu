services:
  - type: web
    name: souvenir-shop-api
    runtime: docker
    dockerContext: .
    dockerfilePath: KhduSouvenirShop.API/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: souvenir-shop-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Stripe__SecretKey
      - key: NovaPoshta__ApiKey

  - type: web
    name: souvenir-shop-frontend
    runtime: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://souvenir-shop-api.onrender.com/api

databases:
  - name: souvenir-shop-db
    databaseName: khdu_souvenir_shop
    user: shop_user
    plan: free
